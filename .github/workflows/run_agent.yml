name: Autonomous Diet & Nutrition Agent

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Autonomous Nutrition Agent
        env:
          USDA_API_KEY   : ${{ secrets.USDA_API_KEY }}
          GROQ_API_KEY   : ${{ secrets.GROQ_API_KEY }}
          EMAIL_SENDER   : ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD : ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER : ${{ secrets.EMAIL_RECEIVER }}
        run: python main_agent.py

      - name: Save reports to repository
        run: |
          git config --local user.email "anaghaunnikrishnan8@gmail.com"
          git config --local user.name "Nutrition Agent Bot"
          git add reports/
          git diff --staged --quiet || git commit -m "Daily nutrition report - $(date '+%Y-%m-%d')"
          git push